<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 10px 20px;
        }
    </style>
</head>
<body>

    <h1>Admin Login</h1>

    <input
        type="email"
        id="email"
        placeholder="Email"
    >

    <input
        type="password"
        id="password"
        placeholder="Password"
    >

    <button onclick="login()">
        Login
    </button>

    <script>

        async function login() {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const response = await fetch(
                "http://localhost:5000/login",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email,
                        password
                    })
                }
            );

            const data = await response.json();

            if (data.token) {

                localStorage.setItem(
                    "token",
                    data.token
                );

                alert("Login Successful");

                window.location.href =
                    "admin.html";

            } else {

                alert("Login Failed");
            }
        }

    </script>

</body>
</html>
